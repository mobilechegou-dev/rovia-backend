# ════════════════════════════════════════════════════════════════════════════════
# ROVIA API — Configuração Principal
# Todas as variáveis sensíveis são injetadas via variáveis de ambiente.
# Nunca comite valores reais neste arquivo.
# ════════════════════════════════════════════════════════════════════════════════

spring:
  application:
    name: rovia-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ─── DATASOURCE (PostgreSQL) ────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rovia_dev}
    username: ${DB_USER:rovia}
    password: ${DB_PASSWORD:rovia_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: rovia-pool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:3}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Evita conexões mortas após inatividade
      keepalive-time: 300000
      connection-test-query: SELECT 1

  # ─── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # NUNCA usar create ou create-drop em produção
      # Migrações são feitas EXCLUSIVAMENTE via Flyway
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        jdbc:
          time_zone: UTC
    show-sql: false
    open-in-view: false

  # ─── FLYWAY (Migrations) ──────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history

  # ─── REDIS (Cache + Dados temporários) ───────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2
          max-wait: 1000ms

  # ─── CACHE ───────────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000   # 10 minutos padrão

  # ─── UPLOAD DE ARQUIVOS ───────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB

# ─── SERVIDOR ─────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
  error:
    include-message: never   # Nunca expõe mensagens de erro internas
    include-stacktrace: never
    include-binding-errors: never

# ─── ROVIA — Configurações de Negócio ────────────────────────────────────────
rovia:
  jwt:
    secret: "c3VwZXItc2VjcmV0YS1yb3ZpYS1qd3QtY2hhdmUtZGV2ZWxvcG1lbnQtMzItYnl0ZXM="
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600}       # 1 hora
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:2592000}  # 30 dias

  cors:
    allowed-origins:
      - ${CORS_ORIGIN_1:http://localhost:3000}
      - ${CORS_ORIGIN_2:http://localhost:8081}

# ─── ACTUATOR (Monitoramento) ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true

info:
  app:
    name: Rovia API
    version: 1.0.0
    description: Plataforma de Mobilidade Logística Sob Demanda

# ─── SWAGGER / OPENAPI ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    disable-swagger-default-url: true
  show-actuator: false

# ─── LOGGING ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.rovia: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId:-}] %logger{36} - %msg%n"
