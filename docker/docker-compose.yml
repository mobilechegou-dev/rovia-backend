# ════════════════════════════════════════════════════════════════════════════════
# ROVIA — Docker Compose: Ambiente de Desenvolvimento
# ════════════════════════════════════════════════════════════════════════════════
# Uso: docker compose -f docker/docker-compose.yml up -d
# pgAdmin (opcional): docker compose -f docker/docker-compose.yml --profile tools up -d

name: rovia-dev

services:

  # ─── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rovia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rovia_dev}
      POSTGRES_USER: ${DB_USER:-rovia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rovia_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rovia} -d ${DB_NAME:-rovia_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rovia_network

  # ─── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rovia_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rovia_network

  # ─── pgAdmin (apenas com --profile tools) ──────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rovia_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rovia.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - rovia_network

  # ─── Redis Commander (apenas com --profile tools) ───────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rovia_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_secret}"
    ports:
      - "${REDIS_UI_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - rovia_network

volumes:
  postgres_data:
    name: rovia_postgres_data
  redis_data:
    name: rovia_redis_data

networks:
  rovia_network:
    name: rovia_network
    driver: bridge
